<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇲🇲 MyanOS Cloud IDE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Padauk', sans-serif; }

        :root {
            --primary: #00ff9d;
            --bg: #0a0c14;
            --surface: #1a1e2a;
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--surface);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .logo { color: var(--primary); font-size: 1.5rem; font-weight: bold; }

        .db-online { color: var(--primary); background: rgba(0,255,157,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--primary); }
        .db-offline { color: #ff4d4d; background: rgba(255,77,77,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid #ff4d4d; }

        .main {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            min-height: 0;
        }

        /* File Manager */
        .file-manager {
            width: 280px;
            background: var(--surface);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            color: var(--primary);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
        }

        .file-item {
            padding: 8px 12px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .file-item:hover { background: rgba(0,255,157,0.1); }

        .btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .editor-panel {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--primary);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            padding: 15px;
            border-bottom: 1px solid var(--primary);
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: var(--bg);
            border: none;
            color: var(--text);
            font-family: monospace;
            padding: 20px;
            font-size: 14px;
            outline: none;
            resize: none;
        }

        .output {
            background: var(--bg);
            border-top: 1px solid var(--primary);
            padding: 15px;
            min-height: 100px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .right-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-box {
            background: var(--surface);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 15px;
        }

        .history-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            font-size: 0.8rem;
        }

        .footer {
            background: var(--surface);
            padding: 10px;
            text-align: center;
            border-top: 1px solid var(--primary);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🇲🇲 MyanOS Cloud</div>
        <div>
            <span id="dbStatus" class="db-offline">🔴 Database Offline</span>
        </div>
    </div>

    <div class="main">
        <!-- File Manager -->
        <div class="file-manager">
            <div class="file-header">
                <span>📁 Database Files</span>
                <button class="btn" onclick="refreshFiles()" id="refreshBtn">🔄</button>
            </div>
            <div id="fileList" class="file-list">
                <div style="color: #666; text-align: center;">Loading...</div>
            </div>
            <div style="margin-top: 10px; font-size:0.8rem; color:#666;">Double-click file to load</div>
        </div>

        <!-- Editor -->
        <div class="editor-panel">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="runCode()">▶️ Run</button>
                <button class="btn" onclick="saveToDB()">💾 Save</button>
                <button class="btn" onclick="newFile()">📄 New</button>
                <input type="text" id="filename" value="program.my" style="background: var(--bg); border:1px solid var(--primary); color:var(--text); padding:5px; border-radius:4px; flex:1;">
            </div>
            <textarea id="editor" placeholder="# မြန်မာကုဒ်ရေးရန်...">ပုံနှိပ် "မင်္ဂလာပါ MyanOS"

ကိန်း x = ၁၀
ကိန်း y = ၂၀
ပုံနှိပ် "x + y = " + (x + y)

အကယ်၍ (x > ၅) {
    ပုံနှိပ် "x က ၅ ထက်ကြီးတယ်"
}</textarea>
            <div class="output" id="output">Ready...</div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="info-box">
                <h3 style="color:var(--primary); margin-bottom:10px;">📜 Run History</h3>
                <div id="historyList"></div>
            </div>
            <div class="info-box">
                <h3 style="color:var(--primary); margin-bottom:10px;">ℹ️ Database Info</h3>
                <p>Server: localhost:8000</p>
                <p>Database: myanmos_db</p>
                <p>Status: <span id="dbStatusText">Checking...</span></p>
            </div>
        </div>
    </div>

    <div class="footer">
        MyanOS Cloud v2.0.0 | Keywords: ၁၂၇ | PostgreSQL
    </div>

    <script>
        // ==================== MYANMAR CODE ENGINE (FIXED VERSION) ====================
        class MyanmarCodeEngine {
            constructor() {
                this.digits = {'၀':'0','၁':'1','၂':'2','၃':'3','၄':'4','၅':'5','၆':'6','၇':'7','၈':'8','၉':'9'};
            }

            execute(code) {
                try {
                    let output = [];
                    let jsCode = code;

                    // ၁။ မြန်မာဂဏန်းတွေကို အာရပ်ဂဏန်းပြောင်း
                    for (let mm in this.digits) {
                        jsCode = jsCode.replace(new RegExp(mm, 'g'), this.digits[mm]);
                    }

                    // ၂။ ပုံနှိပ် -> console.log
                    jsCode = jsCode.replace(/ပုံနှိပ်\s+(.+)/g, 'console.log($1)');

                    // ၃။ ကိန်း -> let
                    jsCode = jsCode.replace(/ကိန်း\s+([a-zA-Z_]+)\s*=\s*([^;\n]+)/g, 'let $1 = $2');

                    // ၄။ အကယ်၍ -> if
                    jsCode = jsCode.replace(/အကယ်၍\s*\((.+?)\)/g, 'if ($1)');

                    // ၅။ မဟုတ်ပါက -> else
                    jsCode = jsCode.replace(/မဟုတ်ပါက/g, '} else {');

                    console.log('JS Code:', jsCode);

                    // ၆။ JavaScript အဖြစ် run
                    const sandbox = {
                        console: { log: (...args) => output.push(args.join(' ')) }
                    };

                    const func = new Function('sandbox', 'with(sandbox) { ' + jsCode + ' }');
                    func(sandbox);

                    return { success: true, output: output.join('\n') };
                } catch (error) {
                    return { success: false, error: error.message };
                }
            }
        }

        const engine = new MyanmarCodeEngine();

        // ==================== DATABASE FUNCTIONS ====================
        const DB_URL = 'http://localhost:8000';

        async function checkDB() {
            try {
                let response = await fetch(DB_URL);
                let data = await response.json();

                if (data.status === 'MyanOS Database Online') {
                    document.getElementById('dbStatus').innerHTML = '🟢 Database Online';
                    document.getElementById('dbStatus').className = 'db-online';
                    document.getElementById('dbStatusText').innerHTML = 'Connected';
                    return true;
                }
            } catch (error) {
                document.getElementById('dbStatus').innerHTML = '🔴 Database Offline';
                document.getElementById('dbStatus').className = 'db-offline';
                document.getElementById('dbStatusText').innerHTML = 'Disconnected';
                return false;
            }
        }

        async function saveToDB() {
            let filename = document.getElementById('filename').value;
            let content = document.getElementById('editor').value;

            try {
                let response = await fetch(`${DB_URL}/files/save?filename=${encodeURIComponent(filename)}&content=${encodeURIComponent(content)}`, {
                    method: 'POST'
                });
                let data = await response.json();

                if (data.status === 'ok') {
                    showOutput(`✅ File saved to database`);
                    refreshFiles();
                }
            } catch (error) {
                showOutput(`❌ Save failed: ${error.message}`);
            }
        }

        async function refreshFiles() {
            let fileList = document.getElementById('fileList');
            fileList.innerHTML = 'Loading...';

            try {
                let response = await fetch(`${DB_URL}/files`);
                let data = await response.json();

                if (data.files && data.files.length > 0) {
                    fileList.innerHTML = '';
                    data.files.forEach(file => {
                        let div = document.createElement('div');
                        div.className = 'file-item';
                        div.ondblclick = () => loadFile(file.name);
                        div.innerHTML = `<span>📄 ${file.name}</span> <span style="color:#666;">${file.created}</span>`;
                        fileList.appendChild(div);
                    });
                } else {
                    fileList.innerHTML = 'No files in database';
                }
            } catch (error) {
                fileList.innerHTML = `Error: ${error.message}`;
            }
        }

        function loadFile(filename) {
            document.getElementById('filename').value = filename;
            showOutput(`📂 Loading: ${filename} (coming soon)`);
        }

        function runCode() {
            let code = document.getElementById('editor').value;
            let result = engine.execute(code);

            if (result.success) {
                showOutput(result.output);
                addToHistory(code, result.output);
            } else {
                showOutput('❌ ' + result.error);
                addToHistory(code, 'ERROR: ' + result.error);
            }
        }

        function showOutput(text) {
            document.getElementById('output').innerHTML = text;
        }

        function newFile() {
            document.getElementById('editor').value = 'ပုံနှိပ် "မင်္ဂလာပါ"';
            document.getElementById('filename').value = 'program.my';
            showOutput('New file created');
        }

        function addToHistory(code, output) {
            let historyList = document.getElementById('historyList');
            let div = document.createElement('div');
            div.className = 'history-item';
            let time = new Date().toLocaleTimeString();
            div.innerHTML = `<div>${code.substring(0,30)}...</div><div style="color:#666; font-size:0.7rem;">${time}</div>`;
            historyList.insertBefore(div, historyList.firstChild);
        }

        // ==================== INITIALIZE ====================
        window.onload = async function() {
            await checkDB();
            await refreshFiles();
            setInterval(checkDB, 30000);
        };
    </script>
</body>
</html>
